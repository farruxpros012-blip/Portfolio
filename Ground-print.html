<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Ground — Print</title>
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

  @page {
    size: A4 portrait;
    margin: 0.4cm;
  }

  @media print {
    html, body {
      background: #fff !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    #root > div {
      min-height: auto !important;
      padding: 0 !important;
    }
  }

  #root > div {
    background: #fff !important;
  }
</style>
</head>
<body>
<div id="root"></div>

<script>window.__PRINT_MODE = true;</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script src="image-slot.js"></script>
<script type="text/babel" src="app.jsx"></script>

<script type="text/babel">
  // Wait for fonts + babel-compiled scripts + image to load, then print.
  (async () => {
    try {
      if (document.fonts && document.fonts.ready) await document.fonts.ready;
    } catch (e) {}
    // wait for hero image to load
    await new Promise(resolve => {
      const start = Date.now();
      const tick = () => {
        const img = document.querySelector('img[alt="Home services"]');
        if (img && img.complete && img.naturalWidth > 0) return resolve();
        if (Date.now() - start > 6000) return resolve();
        setTimeout(tick, 150);
      };
      tick();
    });
    setTimeout(() => window.print(), 500);
  })();
</script>
</body>
</html>
