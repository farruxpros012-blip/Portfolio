<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Let's Trip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,700;1,800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0a0a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* ─── Phone shell ─── */
    .phone {
      position: relative;
      width: 393px;
      height: 852px;
      border-radius: 56px;
      overflow: hidden;
      box-shadow:
        0 0 0 2px #333,
        0 50px 100px rgba(0,0,0,.8);
    }

    /* ─── Background layers ─── */
    .bg-layer {
      position: absolute;
      inset: 0;
    }

    /* Base dark-blue / starry sky from Figma */
    .bg-base {
      background-image: url('https://www.figma.com/api/mcp/asset/d34db6e7-702c-40ed-9f99-4c6f662a595a');
      background-size: cover;
      background-position: center top;
    }

    /* Beach / sunset photo from Figma  */
    .bg-beach {
      background-image: url('https://www.figma.com/api/mcp/asset/57bebdd2-def0-443f-90a7-11aad948accc');
      background-size: 153.64% 130.06%;
      background-position: -26.82% top;
      background-repeat: no-repeat;
    }

    /* Dark gradient overlay so top text stays readable */
    .bg-overlay {
      background: linear-gradient(
        180deg,
        rgba(6, 18, 40, .82)   0%,
        rgba(6, 18, 40, .65)  28%,
        rgba(6, 18, 40, .15)  52%,
        transparent           65%,
        rgba(4, 12, 26, .45) 100%
      );
    }

    /* ─── Phone inner layout ─── */
    .phone-inner {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* ─── Status bar ─── */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px 10px;
      height: 59px;
    }

    .status-time {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      letter-spacing: .2px;
      min-width: 42px;
    }

    .dynamic-island {
      background: #000;
      border-radius: 22px;
      width: 120px;
      height: 34px;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 42px;
      justify-content: flex-end;
    }

    /* ─── App bar / Logo ─── */
    .app-bar {
      padding: 6px 20px 8px;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .logo-globe {
      position: relative;
      width: 40px;
      height: 40px;
    }

    .logo-text-block {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
      margin-left: 2px;
    }

    .logo-text-block span {
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .5px;
    }

    .logo-dot {
      color: #2cd9f5;
    }

    /* ─── Hero ─── */
    .hero {
      padding: 52px 22px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .hero-headline {
      font-size: 52px;
      font-weight: 800;
      color: #fff;
      line-height: 1.04;
      letter-spacing: .3px;
    }

    .hero-headline .accent {
      color: #2cd9f5;
      font-style: italic;
    }

    .hero-subtitle {
      font-size: 16px;
      font-weight: 600;
      color: rgba(255,255,255,.72);
      line-height: 1.5;
      letter-spacing: -.2px;
      display: flex;
      flex-wrap: wrap;
      column-gap: 5px;
      row-gap: 2px;
    }

    .hero-subtitle .sep { opacity: .5; }

    /* ─── Search bar ─── */
    .search-wrap {
      padding: 8px 20px;
      margin-top: 10px;
    }

    .search-bar {
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-radius: 40px;
      display: flex;
      align-items: center;
      box-shadow: 0 4px 18px rgba(0,0,0,.24);
    }

    .search-inner {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 17px 16px 17px 20px;
    }

    .search-placeholder {
      font-size: 16px;
      font-weight: 600;
      color: #111;
      letter-spacing: -.3px;
      flex: 1;
      text-align: center;
    }

    .search-btn-wrap {
      padding: 10px 10px 10px 0;
    }

    .search-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: #057a8d;
      border: 1.5px solid #08abc6;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(0,0,0,.28);
      cursor: pointer;
      transition: transform .15s;
    }

    .search-btn:hover { transform: scale(1.06); }

    /* ─── Spacer ─── */
    .spacer { flex: 1; }

    /* ─── Swipe up ─── */
    .swipe-up {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 28px 20px 14px;
      cursor: pointer;
    }

    .swipe-up-text {
      font-size: 16px;
      font-weight: 600;
      color: rgba(255,255,255,.88);
      letter-spacing: -.3px;
    }

    /* ─── Home indicator ─── */
    .home-indicator {
      display: flex;
      justify-content: center;
      padding: 6px 0 10px;
    }

    .home-bar {
      width: 134px;
      height: 5px;
      background: rgba(255,255,255,.85);
      border-radius: 10px;
    }

    /* ─── Responsive ─── */
    @media (max-width: 430px) {
      .phone {
        width: 100vw;
        height: 100dvh;
        border-radius: 0;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>

<div class="phone">

  <!-- Background stack -->
  <div class="bg-layer bg-base"></div>
  <div class="bg-layer bg-beach"></div>
  <div class="bg-layer bg-overlay"></div>

  <div class="phone-inner">

    <!-- ── Status Bar ── -->
    <div class="status-bar">
      <span class="status-time">9:41</span>
      <div class="dynamic-island"></div>
      <div class="status-icons">
        <!-- Cellular signal -->
        <svg width="18" height="12" viewBox="0 0 18 12" fill="white">
          <rect x="0"   y="8"   width="3" height="4"  rx="1"/>
          <rect x="4.5" y="5"   width="3" height="7"  rx="1"/>
          <rect x="9"   y="2.5" width="3" height="9.5" rx="1"/>
          <rect x="13.5" y="0"  width="3" height="12" rx="1"/>
        </svg>
        <!-- WiFi -->
        <svg width="16" height="12" viewBox="0 0 20 14" fill="none">
          <path d="M10 10.5a2 2 0 1 1 0 4 2 2 0 0 1 0-4z" fill="white"/>
          <path d="M4.9 7.8A7.5 7.5 0 0 1 10 5.5c1.93 0 3.7.73 5.1 1.95" stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none" opacity=".85"/>
          <path d="M1.4 4.4A12.5 12.5 0 0 1 10 1.5c3.2 0 6.1 1.2 8.3 3.2" stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none" opacity=".6"/>
        </svg>
        <!-- Battery -->
        <svg width="28" height="13" viewBox="0 0 28 13" fill="none">
          <rect x=".75" y=".75" width="23.5" height="11.5" rx="3.5" stroke="white" stroke-opacity=".35" stroke-width="1.5"/>
          <rect x="2" y="2" width="19" height="9" rx="2.5" fill="white"/>
          <path d="M25.5 4.5c1 .5 1 3.5 0 4V4.5z" fill="white" opacity=".4"/>
        </svg>
      </div>
    </div>

    <!-- ── App Bar / Logo ── -->
    <div class="app-bar">
      <div class="logo-wrap">
        <!-- Globe SVG -->
        <svg class="logo-globe" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="18" stroke="#2cd9f5" stroke-width="1.6"/>
          <!-- Latitude lines -->
          <ellipse cx="20" cy="20" rx="18" ry="9"  stroke="#2cd9f5" stroke-width="1.2" opacity=".65"/>
          <ellipse cx="20" cy="20" rx="18" ry="4"  stroke="#2cd9f5" stroke-width="1"   opacity=".4"/>
          <!-- Vertical meridian -->
          <line x1="20" y1="2"  x2="20" y2="38" stroke="#2cd9f5" stroke-width="1.2" opacity=".6"/>
          <!-- Horizontal equator -->
          <line x1="2"  y1="20" x2="38" y2="20" stroke="#2cd9f5" stroke-width="1.2" opacity=".6"/>
          <!-- Location pin -->
          <circle cx="20" cy="14" r="3.5" fill="#2cd9f5"/>
          <path d="M20 17.5 Q20 22 17 25" stroke="#2cd9f5" stroke-width="1.4" stroke-linecap="round" fill="none"/>
        </svg>

        <div class="logo-text-block">
          <span>let<span class="logo-dot">'</span>s</span>
          <span>trip</span>
        </div>
      </div>
    </div>

    <!-- ── Hero Content ── -->
    <div class="hero">
      <h1 class="hero-headline">
        Всё для<br>
        <span class="accent">путешествия</span>
      </h1>

      <p class="hero-subtitle">
        <span>Авиабилеты</span><span class="sep"> · </span>
        <span>Отели</span><span class="sep"> · </span>
        <span>Туры</span><span class="sep"> · </span>
        <span>eSIM</span><span class="sep"> · </span>
        <span>Экскурсии</span>
        <span style="flex-basis:100%;height:0"></span>
        <span>Аэропорт-такси</span><span class="sep"> · </span>
        <span>Трансфер</span><span class="sep"> · </span>
        <span>Аренда авто</span>
      </p>
    </div>

    <!-- ── Search Bar ── -->
    <div class="search-wrap">
      <div class="search-bar">
        <div class="search-inner">
          <!-- Magnifier icon -->
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <circle cx="10" cy="10" r="7.2" stroke="#111" stroke-width="1.8"/>
            <path d="M15.7 15.7L20 20" stroke="#111" stroke-width="1.9" stroke-linecap="round"/>
          </svg>
          <span class="search-placeholder">Куда отправимся</span>
        </div>
        <div class="search-btn-wrap">
          <div class="search-btn">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M4 10H16M16 10L11 5M16 10L11 15"
                stroke="white" stroke-width="2.1"
                stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
      </div>
    </div>

    <div class="spacer"></div>

    <!-- ── Swipe Up ── -->
    <div class="swipe-up">
      <svg width="24" height="14" viewBox="0 0 24 14" fill="none">
        <path d="M2 12L12 2L22 12"
          stroke="rgba(255,255,255,.88)"
          stroke-width="2.2"
          stroke-linecap="round"
          stroke-linejoin="round"/>
      </svg>
      <span class="swipe-up-text">Проведите вверх</span>
    </div>

    <!-- ── Home Indicator ── -->
    <div class="home-indicator">
      <div class="home-bar"></div>
    </div>

  </div><!-- phone-inner -->
</div><!-- phone -->

</body>
</html>
